services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_PORT: 3001

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_URL: http://api:3001
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
